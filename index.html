<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pacientes</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --bg: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 22px; }

        .field { margin-bottom: 18px; }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            color: #333; 
            font-size: 14px;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .readonly { 
            background-color: #f9f9f9; 
            color: var(--success); 
            font-weight: bold; 
            text-align: center;
        }

        .row { display: flex; gap: 15px; }
        .row .field { flex: 1; }

        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover { background-color: #004494; }
        button:disabled { background-color: #ccc; }

        #status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 Registro de Atendimento</h2>
    
    <div class="field">
        <label>Paciente</label>
        <input type="text" id="paciente" placeholder="Nome completo">
    </div>

    <div class="field">
        <label>Leito</label>
        <select id="leito">
            <script>
                for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);
            </script>
        </select>
    </div>

    <div class="row">
        <div class="field">
            <label>Início</label>
            <input type="time" id="inicio" onchange="calcularDiferenca()">
        </div>
        <div class="field">
            <label>Fim</label>
            <input type="time" id="fim" onchange="calcularDiferenca()">
        </div>
    </div>

    <div class="field">
        <label>Tempo</label>
        <input type="text" id="tempo" class="readonly" readonly placeholder="00:00">
    </div>

    <button id="btnSalvar" onclick="enviarParaSheets()">Salvar Registro</button>
    <div id="status"></div>
</div>

<script>
    // --- COLE O SEU LINK DO GOOGLE APPS SCRIPT ABAIXO ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxykjij-ue7hCbdjP5OwaeLEWIN6YBvzTL6t2KpyF66SY8qVCbEq1M-4Uio7c5ENvVL/exec";

    function calcularDiferenca() {
        const inicio = document.getElementById('inicio').value;
        const fim = document.getElementById('fim').value;
        const campoTempo = document.getElementById('tempo');

        if (inicio && fim) {
            let [h1, m1] = inicio.split(':').map(Number);
            let [h2, m2] = fim.split(':').map(Number);
            let t1 = h1 * 60 + m1, t2 = h2 * 60 + m2;
            if (t2 < t1) t2 += 1440; // Virada de dia
            let diff = t2 - t1;
            campoTempo.value = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
    }

    async function enviarParaSheets() {
        const btn = document.getElementById('btnSalvar');
        const status = document.getElementById('status');
        
        const dados = {
            paciente: document.getElementById('paciente').value,
            leito: document.getElementById('leito').value,
            inicio: document.getElementById('inicio').value,
            fim: document.getElementById('fim').value,
            tempo: document.getElementById('tempo').value
        };

        if (!dados.paciente || !dados.inicio || !dados.fim) {
            status.style.color = "orange";
            status.innerText = "⚠️ Preencha Paciente e Horários!";
            return;
        }

        btn.disabled = true;
        status.style.color = "blue";
        status.innerText = "⏳ Enviando...";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dados)
            });

            status.style.color = "green";
            status.innerText = "✅ Registro salvo com sucesso!";
            
            // Limpa os campos
            document.getElementById('paciente').value = '';
            document.getElementById('inicio').value = '';
            document.getElementById('fim').value = '';
            document.getElementById('tempo').value = '';

        } catch (e) {
            status.style.color = "red";
            status.innerText = "❌ Erro ao conectar.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
